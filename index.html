<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Trip on Triply</title>
    <style>
        :root {
            --primary: #A3F090;
            --background: #121212;
            --surface: #1E1E1E;
            --text: #FFFFFF;
            --text-secondary: #B3B3B3;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: var(--surface);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            margin-top: 0;
            color: var(--text);
            font-size: 24px;
        }
        p {
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: #000;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .app-store-badge {
            margin-top: 20px;
            display: block;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✈️</div>
        <h1>You've been invited!</h1>
        <p>Tap below to join the trip in the app. Since Triply is not yet on the App Store, you must have the app installed via TestFlight or Simulator.</p>
        
        <!-- Link to custom scheme fallback -->
        <a id="join-btn" href="triply://join" class="btn">Join Trip in App</a>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                console.log("Trip code:", code);
                // Update the button href to include the code
                const joinBtn = document.getElementById('join-btn');
                if (joinBtn) {
                    joinBtn.href = "triply://join?code=" + code;
                }
            }
        };
    </script>
</body>
</html>
